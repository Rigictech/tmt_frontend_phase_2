<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Form Builder Iframe</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap/dist/css/bootstrap.min.css">
  <script src="https://cdn.form.io/js/formio.embed.js"></script>
  <link rel="stylesheet" href="https://cdn.form.io/js/formio.full.min.css" />
  <link rel="stylesheet" href="../src/index.css" />
  <link rel="stylesheet" href="../src/App.css" />


  <style>
    body { margin: 0; padding: 0; }
    #formio-builder, #formio-renderer { min-height: 600px; }
    body{
      background-color: #FDFDFD;
      font-family: 'Poppins', sans-serif;

    }
  </style>
</head>
<body>
  <div id="formio-builder" style="display:none;"></div>
  <div id="formio-renderer" style="display:none;"></div>
  <script>
    let builderInstance = null;
    let rendererInstance = null;
    window.addEventListener('message', async (event) => {
      const { type, schema, options, formUrl } = event.data || {};
      if (type === 'init-builder') {
        document.getElementById('formio-builder').style.display = '';
        document.getElementById('formio-renderer').style.display = 'none';
        if (builderInstance) builderInstance.destroy(true);
        builderInstance = await Formio.builder(document.getElementById('formio-builder'), schema, options);
        builderInstance.on('change', (newSchema) => {
          window.parent.postMessage({ type: 'builder-change', schema: newSchema }, '*');
        });
      }
      if (type === 'init-renderer') {
        document.getElementById('formio-builder').style.display = 'none';
        document.getElementById('formio-renderer').style.display = '';
        if (rendererInstance) rendererInstance.destroy(true);
        rendererInstance = await Formio.createForm(document.getElementById('formio-renderer'), formUrl, options);
        rendererInstance.on('submit', (submission) => {
          window.parent.postMessage({ type: 'form-submitted', submission }, '*');
        });
      }
    });
  </script>
</body>
</html>
